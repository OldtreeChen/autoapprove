name: eContact Auto Approve

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

concurrency:
  group: econtact-auto-approve
  cancel-in-progress: false

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ECONTACT_BASE_URL: ${{ secrets.ECONTACT_BASE_URL }}
      ECONTACT_USER: ${{ secrets.ECONTACT_USER }}
      ECONTACT_PASSWORD: ${{ secrets.ECONTACT_PASSWORD }}
      ECONTACT_IDENTITY_ID: ${{ secrets.ECONTACT_IDENTITY_ID }}
      ECONTACT_IDENTITY_NAME: ${{ secrets.ECONTACT_IDENTITY_NAME }}
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      LINE_TO: ${{ secrets.LINE_TO }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${ECONTACT_USER:-}" || { echo "Missing ECONTACT_USER secret"; exit 1; }
          test -n "${ECONTACT_PASSWORD:-}" || { echo "Missing ECONTACT_PASSWORD secret"; exit 1; }

      - name: Run auto approval
        run: node ./econtact-auto-approve.js --execute

      - name: Notify LINE
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${LINE_CHANNEL_ACCESS_TOKEN:-}" ] || [ -z "${LINE_TO:-}" ]; then
            echo "LINE notification skipped: missing LINE_CHANNEL_ACCESS_TOKEN or LINE_TO secret."
            exit 0
          fi

          if [ "${{ job.status }}" = "success" ]; then
            status_text="success"
          else
            status_text="failure"
          fi

          message=$(cat <<EOF
          eContact Auto Approve ${status_text}
          repo: ${{ github.repository }}
          ref: ${{ github.ref_name }}
          sha: ${{ github.sha }}
          run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )

          jq -n \
            --arg to "$LINE_TO" \
            --arg text "$message" \
            '{to: $to, messages: [{type: "text", text: $text}]}' \
            > line-payload.json

          curl -sS https://api.line.me/v2/bot/message/push \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${LINE_CHANNEL_ACCESS_TOKEN}" \
            -d @line-payload.json
